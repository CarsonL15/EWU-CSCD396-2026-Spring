name: Diag - Fetch Container App + Function logs

on:
  workflow_dispatch:
  push:
    branches: [assignment3]
    paths:
      - '.github/workflows/diag-logs.yml'

permissions:
  id-token: write
  contents: read

env:
  RG_NAME: 'rg-assignment2-carsonl15'
  CONTAINER_APP_NAME: 'ca-assignment2'
  FUNCTION_APP_NAME: 'func-assignment3-carsonl15'

jobs:
  diag:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Container App revision status
        run: |
          az containerapp revision list -n "${{ env.CONTAINER_APP_NAME }}" -g "${{ env.RG_NAME }}" \
            --query "[].{name:name, active:properties.active, healthState:properties.healthState, image:properties.template.containers[0].image, created:properties.createdTime}" -o table || true

      - name: Container App logs (last 200 lines)
        run: |
          az containerapp logs show -n "${{ env.CONTAINER_APP_NAME }}" -g "${{ env.RG_NAME }}" --type console --tail 200 || true

      - name: Function App settings sanity (no secrets)
        run: |
          az functionapp config appsettings list -n "${{ env.FUNCTION_APP_NAME }}" -g "${{ env.RG_NAME }}" \
            --query "[?!(starts_with(name, 'WEBSITE_AUTH') || starts_with(name, 'AzureWebJobsStorage'))].{name:name, value:value}" -o table || true

      - name: Function App invocation log (last 50 events from App Insights)
        run: |
          AI_ID=$(az monitor app-insights component show -g "${{ env.RG_NAME }}" --app "ai-${{ env.FUNCTION_APP_NAME }}" --query id -o tsv 2>/dev/null || echo "")
          if [ -n "$AI_ID" ]; then
            az monitor app-insights query --ids "$AI_ID" \
              --analytics-query "traces | where timestamp > ago(1h) | order by timestamp desc | take 50 | project timestamp, severityLevel, message" \
              -o table || true
          else
            echo "App Insights component not found"
          fi

      - name: List recent blobs in messages container
        run: |
          SA="sa3msgcarsonl15a3"
          KEY=$(az storage account keys list -g "${{ env.RG_NAME }}" -n "$SA" --query '[0].value' -o tsv)
          az storage blob list -c messages --account-name "$SA" --account-key "$KEY" \
            --query "reverse(sort_by([].{name:name, size:properties.contentLength, modified:properties.lastModified}, &modified)) | [0:10]" -o table || true

      - name: Query SQL Messages table (top 10)
        run: |
          set +e
          # Get the SQL admin password from the container app secret
          PWD=$(az containerapp secret show -n "${{ env.CONTAINER_APP_NAME }}" -g "${{ env.RG_NAME }}" --secret-name sql-connection-string --query value -o tsv 2>/dev/null | sed -nE 's/.*Password=([^;]+);.*/\1/p')
          SQL_FQDN="sql-asn3-cus-cl15.database.windows.net"
          if [ -z "$PWD" ]; then echo "couldn't fetch SQL password"; exit 0; fi
          # Install sqlcmd
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add - >/dev/null 2>&1
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list >/dev/null
          sudo ACCEPT_EULA=Y apt-get update -y >/dev/null 2>&1
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev >/dev/null 2>&1
          /opt/mssql-tools18/bin/sqlcmd -S "tcp:$SQL_FQDN,1433" -d sqldb-assignment3 -U sqladmin -P "$PWD" -Q "SELECT TOP 10 Id, Message, CreatedAt FROM dbo.Messages ORDER BY Id DESC;" -C
          true
